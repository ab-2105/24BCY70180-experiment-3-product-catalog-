<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Filter Experiment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Product Catalog</h2>
        
        <div class="filter-box">
            <label for="sort">Sort by Price:</label>
            <select id="sort-dropdown">
                <option value="default">Select...</option>
                <option value="low">Low to High</option>
                <option value="high">High to Low</option>
            </select>
        </div>

        <div class="product-grid" id="product-list">
            <div class="product-card" data-price="25">
                <img src="https://images.unsplash.com/photo-1628832307345-7404b47f1751?q=80&w=2083&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Mouse">
                <h3>Wireless Mouse</h3>
                <p>$25</p>
            </div>
            <div class="product-card" data-price="10">
                <img src="https://images.unsplash.com/photo-1572721546624-05bf65ad7679?q=80&w=1073&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Product">
                <h3>USB Cable</h3>
                <p>$10</p>
            </div>
            <div class="product-card" data-price="50">
                <img src="https://plus.unsplash.com/premium_photo-1663100722417-6e36673fe0ed?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Product">
                <h3>Gaming Keyboard</h3>
                <p>$50</p>
            </div>
            <div class="product-card" data-price="550">
                <img src="https://images.unsplash.com/photo-1591370874773-6702e8f12fd8?q=80&w=1074&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Product">
                <h3>Monitor</h3>
                <p>$550</p>
            </div>
            <div class="product-card" data-price="50">
                <img src="https://images.unsplash.com/photo-1702561667800-2c49b0182229?q=80&w=1025&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="Product">
                <h3>Track pads</h3>
                <p>$50</p>
            </div>
            <div class="product-card" data-price="30">
                <img src="https://media.istockphoto.com/id/1170073824/photo/gamer-work-space-concept-top-view-a-gaming-gear-mouse-keyboard-joystick-headset-mobile.jpg?s=1024x1024&w=is&k=20&c=GZFww9gwHm26f9wtUAv175fQf0HqygcPjn-_mXZtJjw=" alt="Product">
                <h3>Accessories</h3>
                <p>$30</p>
            </div>
            <div class="product-card" data-price="250">
                <img src="https://via.placeholder.com/150" alt="Product">
                <h3>Furniture</h3>
                <p>$250</p>
            </div>
            <div class="product-card" data-price="15">
                <img src="https://via.placeholder.com/150" alt="Product">
                <h3>Triggers</h3>
                <p>$15</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
